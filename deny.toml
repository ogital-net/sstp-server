# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
# Mirrors the radius-tokio posture: permissive licences only, deny unknown
# registries and git sources, warn on dup versions.

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]

# ── Licenses ─────────────────────────────────────────────────────────
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
]
unused-allowed-license = "warn"

# ── Bans ─────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "deny"
# A git dependency carries no version requirement, so cargo-deny counts
# it as a wildcard. `radius-tokio` is our own sister crate pulled in via
# git (branch = "client") until it publishes to crates.io. Exempt git /
# path deps: this only applies to private crates (`publish = false` in
# Cargo.toml) and to dev-dependencies, so a real `foo = "*"` from a
# published dependency is still denied.
allow-wildcard-paths = true

# ── Advisories ───────────────────────────────────────────────────────
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []

# ── Sources ──────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Require at least a branch specifier for git sources (no bare
# master-tracking) so `cargo update` behaviour is predictable.
required-git-spec = "branch"

# Trust every repo under our own GitHub org. `radius-tokio` (and its
# `radius-tokio-dict` / `-codegen` members) is pulled in via
# git+https://github.com/ogital-net/radius-tokio until it publishes to
# crates.io; allowing the org avoids re-listing each member crate.
[sources.allow-org]
github = ["ogital-net"]
